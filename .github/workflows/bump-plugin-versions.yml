---
name: Bump plugin versions on dependency updates
on:
  pull_request:
    types: [opened, synchronize]
    paths:
    - src/*/pyproject.toml

permissions:
  contents: write

jobs:
  bump-versions:
    if: github.actor == 'renovate[bot]' || github.actor == 'renovate-bot'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        ref: ${{ github.head_ref }}
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Detect modified plugin pyproject.toml files
      id: detect
      run: |
        git fetch origin main
        MODIFIED_FILES=$(git diff --name-only origin/main HEAD -- 'src/*/pyproject.toml')
        if [ -z "$MODIFIED_FILES" ]; then
          echo "changed=false" >> "$GITHUB_OUTPUT"
        else
          echo "changed=true" >> "$GITHUB_OUTPUT"
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "files<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$MODIFIED_FILES" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"
        fi

    - name: Bump patch version in modified plugin pyproject.toml files
      if: steps.detect.outputs.changed == 'true'
      run: |
        echo "${{ steps.detect.outputs.files }}" | while IFS= read -r file; do
          [ -z "$file" ] && continue
          echo "Bumping version in $file"
          python scripts/bump_plugin_version.py "$file"
        done

    - name: Commit version bumps
      if: steps.detect.outputs.changed == 'true'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add src/*/pyproject.toml
        if git diff --cached --quiet; then
          echo "No version changes to commit"
        else
          git commit -m "chore: bump plugin patch versions for dependency updates"
          git push
        fi
